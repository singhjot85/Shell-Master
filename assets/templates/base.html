<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ context.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/css/style.css">
    {% block extra_head %}
    {% endblock %}
</head>
<body class="app-shell">
    <div class="app-backdrop"></div>
    <div class="app-frame">
        <header class="container py-4">
            <nav class="navbar navbar-expand-lg glass-nav rounded-4 px-4 py-3">
                <a class="navbar-brand fw-semibold tracking-wide" href="/">jqtools</a>
                <div class="navbar-nav ms-auto d-flex flex-row gap-3">
                    <a class="nav-link {% if context.active_page == 'home' %}active{% endif %}" href="/">Home</a>
                    <a class="nav-link {% if context.active_page == 'formatter' %}active{% endif %}" href="/jq-formatter">Formatter</a>
                </div>
            </nav>
        </header>
        <main>
            {% block content %}
            {% endblock %}
        </main>
    </div>

    {% block extra_scripts %}
    {% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
