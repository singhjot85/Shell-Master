<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ context.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/css/style.css">
    {% block extra_head %}
    {% endblock %}
</head>
<body class="app-shell" data-theme="light">
    <div class="app-backdrop"></div>
    <div class="app-frame">
        <header class="container py-4">
            <nav class="navbar navbar-expand-lg glass-nav rounded-4 px-4 py-3">
                <a class="navbar-brand fw-semibold tracking-wide" href="/">jqtools</a>
                <div class="ms-auto d-flex align-items-center gap-3 gap-lg-4">
                    <div class="navbar-nav d-flex flex-row gap-3">
                        <a class="nav-link {% if context.active_page == 'home' %}active{% endif %}" href="/">Home</a>
                        <a class="nav-link {% if context.active_page == 'formatter' %}active{% endif %}" href="/jq-formatter">Formatter</a>
                        <a class="nav-link {% if context.active_page == 'debugger' %}active{% endif %}" href="/jq-debugger">Debugger</a>
                    </div>
                    <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle dark theme">
                        <span class="theme-toggle-icon" id="theme-toggle-icon">◐</span>
                        <span class="theme-toggle-label" id="theme-toggle-label">Dark</span>
                    </button>
                </div>
            </nav>
        </header>
        <main>
            {% block content %}
            {% endblock %}
        </main>
    </div>

    {% block extra_scripts %}
    {% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script>
        const STORAGE_KEY = "jqtools-theme";
        const body = document.body;
        const toggle = document.getElementById("theme-toggle");
        const toggleLabel = document.getElementById("theme-toggle-label");

        const savedTheme = localStorage.getItem(STORAGE_KEY);
        const preferredTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        applyTheme(savedTheme || preferredTheme);

        toggle.addEventListener("click", () => {
            const nextTheme = body.dataset.theme === "dark" ? "light" : "dark";
            applyTheme(nextTheme);
            localStorage.setItem(STORAGE_KEY, nextTheme);
        });

        function applyTheme(theme) {
            body.dataset.theme = theme;
            toggleLabel.textContent = theme === "dark" ? "Light" : "Dark";
        }
    </script>
</body>
</html>
